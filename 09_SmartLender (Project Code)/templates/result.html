<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prediction Result — Smart Lender</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <header>
      <h1>🏦 Smart Lender</h1>
    </header>
    <div class="result-card {% if 'Approved' in prediction %}approved{% else %}rejected{% endif %}">
      <h2>Prediction Result</h2>
      <div class="result-badge">{{ prediction }}</div>
      <p class="confidence">Model confidence: <strong>{{ confidence }}%</strong></p>
      <a href="/" class="btn-back">← Check Another Applicant</a>
    </div>
  </div>
</body>
</html>
